<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register — FreshBite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="header"></div>

  <main class="container">
    <div class="auth-wrap">
      <div style="text-align:center; margin-bottom:20px;">
        <span style="font-size:3rem;">🍽️</span>
        <h1 style="font-size:1.6rem;">Welcome to FreshBite</h1>
        <p style="color:var(--brown-soft);">Log in to order faster and track deliveries</p>
      </div>

      <div class="auth-tabs">
        <button id="tabLogin" class="active">Login</button>
        <button id="tabRegister">Register</button>
      </div>

      <!-- Login -->
      <form class="form-card" id="loginForm" novalidate>
        <div class="form-field">
          <label for="lEmail">Email</label>
          <input id="lEmail" type="email" placeholder="you@example.com" required>
        </div>
        <div class="form-field">
          <label for="lPass">Password</label>
          <input id="lPass" type="password" placeholder="••••••••" required>
        </div>
        <p class="field-err" id="loginErr" style="margin-bottom:10px;"></p>
        <button class="btn btn-block" type="submit">Login 🔐</button>
      </form>

      <!-- Register -->
      <form class="form-card" id="registerForm" hidden novalidate>
        <div class="form-field">
          <label for="rName">Full Name</label>
          <input id="rName" placeholder="e.g. Yug Patel" required>
        </div>
        <div class="form-field">
          <label for="rEmail">Email</label>
          <input id="rEmail" type="email" placeholder="you@example.com" required>
        </div>
        <div class="form-field">
          <label for="rPhone">Phone</label>
          <input id="rPhone" type="tel" placeholder="10-digit mobile number" maxlength="10" required>
        </div>
        <div class="form-field">
          <label for="rPass">Password</label>
          <input id="rPass" type="password" placeholder="Min. 6 characters" required>
        </div>
        <p class="field-err" id="registerErr" style="margin-bottom:10px;"></p>
        <button class="btn btn-block" type="submit">Create Account 🎉</button>
      </form>

      <p style="text-align:center; font-size:0.8rem; color:var(--brown-soft); margin-top:14px;">
        Simulated login for this demo — accounts are stored only in your browser.
      </p>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    FB.init("");
    if (FB.getUser()) location.href = "account.html";

    const tabL = document.getElementById("tabLogin"), tabR = document.getElementById("tabRegister");
    const formL = document.getElementById("loginForm"), formR = document.getElementById("registerForm");

    function showTab(login) {
      tabL.classList.toggle("active", login);
      tabR.classList.toggle("active", !login);
      formL.hidden = !login;
      formR.hidden = login;
    }
    tabL.onclick = () => showTab(true);
    tabR.onclick = () => showTab(false);
    if (location.hash === "#register") showTab(false);

    formL.addEventListener("submit", e => {
      e.preventDefault();
      const res = FB.login(document.getElementById("lEmail").value.trim().toLowerCase(),
                           document.getElementById("lPass").value);
      if (!res.ok) { document.getElementById("loginErr").textContent = res.msg; return; }
      FB.toast("Welcome back! 👋");
      setTimeout(() => location.href = "account.html", 600);
    });

    formR.addEventListener("submit", e => {
      e.preventDefault();
      const err = document.getElementById("registerErr");
      const name = document.getElementById("rName").value.trim();
      const email = document.getElementById("rEmail").value.trim().toLowerCase();
      const phone = document.getElementById("rPhone").value.trim();
      const pass = document.getElementById("rPass").value;
      if (name.length < 2) { err.textContent = "Please enter your name"; return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent = "Enter a valid email"; return; }
      if (!/^\d{10}$/.test(phone)) { err.textContent = "Enter a valid 10-digit phone"; return; }
      if (pass.length < 6) { err.textContent = "Password must be at least 6 characters"; return; }
      const res = FB.register(name, email, phone, pass);
      if (!res.ok) { err.textContent = res.msg; return; }
      FB.toast("Account created! 🎉");
      setTimeout(() => location.href = "account.html", 600);
    });
  </script>
</body>
</html>
