<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dish Details — FreshBite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="header"></div>

  <main class="container section" id="productMain"></main>

  <section class="container" style="padding-bottom:56px;" id="relatedSection" hidden>
    <div class="section-head">
      <div><h2>You may also like 😋</h2></div>
    </div>
    <div class="card-grid" id="relatedGrid"></div>
  </section>

  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    FB.init("");

    const item = FB.findItem(FB.qs("id"));
    const main = document.getElementById("productMain");
    let qty = 1;

    if (!item) {
      main.innerHTML = `
        <div class="empty-state">
          <span class="es-emoji">😕</span>
          <h3>Dish not found</h3>
          <p>It may have been removed from the menu.</p>
          <a class="btn" href="menu.html">Browse Menu</a>
        </div>`;
    } else {
      const r = FB.findRestaurant(item.rid);
      document.title = `${item.name} — FreshBite`;
      main.innerHTML = `
      <div class="product-layout">
        <div class="product-img">${item.emoji}</div>
        <div class="product-info">
          <div class="card-meta">${FB.dietBadge(item)} <span class="rating">★ ${r.rating}</span></div>
          <h1>${item.name}</h1>
          <p style="color:var(--brown-soft); margin-bottom:8px;">
            From <a href="menu.html?restaurant=${r.id}" style="color:var(--orange); font-weight:800;">${r.name}</a>
            · ${item.category} · ⏱ ${r.deliveryTime}
          </p>
          <p style="margin-bottom:16px;">${item.desc}</p>
          <div class="price" style="margin-bottom:20px;">${FB.money(item.price)}</div>

          <div style="display:flex; gap:14px; align-items:center; flex-wrap:wrap;">
            <div class="qty-stepper">
              <button id="qtyMinus" aria-label="Decrease">−</button>
              <span class="qty-val" id="qtyVal">1</span>
              <button id="qtyPlus" aria-label="Increase">+</button>
            </div>
            <button class="btn" id="addBtn">🛒 Add to Cart · <span id="lineTotal">${FB.money(item.price)}</span></button>
            <button class="btn btn-outline" id="wishBtn">${FB.inWishlist(item.id) ? "❤️ Wishlisted" : "🤍 Wishlist"}</button>
          </div>

          <div class="info-block">
            <h3>🧾 Ingredients</h3>
            <div class="pill-row">${item.ingredients.map(i => `<span class="pill">${i}</span>`).join("")}</div>
          </div>

          <div class="info-block">
            <h3>📊 Nutritional Info <span style="font-weight:400; font-size:0.8rem; color:var(--brown-soft);">(per serving)</span></h3>
            <div class="nutri-grid">
              <div class="nutri-cell"><strong>${item.nutrition.cal}</strong><span>Calories</span></div>
              <div class="nutri-cell"><strong>${item.nutrition.protein}g</strong><span>Protein</span></div>
              <div class="nutri-cell"><strong>${item.nutrition.carbs}g</strong><span>Carbs</span></div>
              <div class="nutri-cell"><strong>${item.nutrition.fat}g</strong><span>Fat</span></div>
            </div>
          </div>
        </div>
      </div>`;

      const updateQtyUI = () => {
        document.getElementById("qtyVal").textContent = qty;
        document.getElementById("lineTotal").textContent = FB.money(item.price * qty);
      };
      document.getElementById("qtyMinus").onclick = () => { if (qty > 1) { qty--; updateQtyUI(); } };
      document.getElementById("qtyPlus").onclick = () => { qty++; updateQtyUI(); };
      document.getElementById("addBtn").onclick = () => FB.addToCart(item.id, qty);
      document.getElementById("wishBtn").onclick = e => {
        const on = FB.toggleWishlist(item.id);
        e.currentTarget.textContent = on ? "❤️ Wishlisted" : "🤍 Wishlist";
      };

      // Related: same restaurant or same category
      const related = MENU.filter(m => m.id !== item.id && (m.rid === item.rid || m.category === item.category)).slice(0, 4);
      if (related.length) {
        document.getElementById("relatedSection").hidden = false;
        document.getElementById("relatedGrid").innerHTML = related.map(FB.foodCardHTML).join("");
      }
    }
  </script>
</body>
</html>
